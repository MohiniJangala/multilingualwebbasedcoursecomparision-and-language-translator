<!DOCTYPE html>
<html>
<head>
    <title>Video Translator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #38bdf8;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        .subtitle {
            margin-top: 15px;
            font-size: 14px;
            color: #cbd5f5;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🎥 Video Translator</h1>

    <form action="/translate" method="post" enctype="multipart/form-data">

        <!-- Upload -->
        <input type="file" name="video" required>

        <!-- Source Language -->
        <select name="source_lang">
            <option disabled selected>Source Language</option>
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="ta">Tamil</option>
            <option value="te">Telugu</option>
        </select>

        <!-- Target Language -->
        <select name="language">
            <option disabled selected>Translate To</option>
            <option value="hi">Hindi</option>
            <option value="ta">Tamil</option>
            <option value="te">Telugu</option>
            <option value="ml">Malayalam</option>
            <option value="kn">Kannada</option>
            <option value="mr">Marathi</option>
            <option value="bn">Bengali</option>
            <option value="gu">Gujarati</option>
            <option value="pa">Punjabi</option>
            <option value="ur">Urdu</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="es">Spanish</option>
        </select>

        <!-- Subtitle / Description -->
        <input type="text" placeholder="Subtitle / Description (optional)">

        <!-- Button -->
        <button type="submit">Translate</button>

    </form>

    <div class="subtitle">
        Upload a video and get translated audio in your selected language 🎧
    </div>
</div>
</body>
</html>
